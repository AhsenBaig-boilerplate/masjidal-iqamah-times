name: Commit Message Check

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  commit-message-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get PR commits
        id: commits
        uses: tim-actions/get-pr-commits@198af03565609bb4ed924d1260247b4881f09e7d # v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check commit messages
        env:
          COMMITS_JSON: ${{ steps.commits.outputs.commits }}
        run: |
          regex='^(feat|fix|chore|docs|style|refactor|perf|test|ci|build|revert)(\(.+\))?: .+'
          failed=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$regex"; then
              echo "::error::Commit message does not follow Conventional Commits: '$msg'"
              failed=1
            fi
          done < <(echo "$COMMITS_JSON" | jq -r '.[].commit.message')
          exit $failed
