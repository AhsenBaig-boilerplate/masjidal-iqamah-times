on:
jobs:
name: Deploy Dev

  build:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    runs-on: ubuntu-latest
  push:
    branches: [ dev ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Set CNAME for dev
        run: echo "dev.masjidal-iqamah-times.ahsenbaig.dev" > CNAME
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://dev.masjidal-iqamah-times.ahsenbaig.dev
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
