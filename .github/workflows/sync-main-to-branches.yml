name: "🔄 Sync main → dev/feature"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sync:
    name: "🔄 Open sync PRs for dev/feature branches"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔄 Sync branches"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branches=$(git branch -r \
            | grep -E 'origin/(dev$|feature/)' \
            | sed 's|[[:space:]]*origin/||' \
            | sort -u)

          if [ -z "$branches" ]; then
            echo "No dev/feature branches found — nothing to sync."
            exit 0
          fi

          for branch in $branches; do
            echo "--- Checking $branch ---"

            # Nothing to do if main is already fully contained in the branch
            if git merge-base --is-ancestor origin/main "origin/$branch"; then
              echo "✅ $branch already up to date with main"
              continue
            fi

            # Skip if a sync PR is already open
            if gh pr list --base "$branch" --head main --state open | grep -q .; then
              echo "⏭️  Sync PR already open for $branch — skipping"
              continue
            fi

            gh pr create \
              --base "$branch" \
              --head main \
              --title "chore: sync main into $branch" \
              --body "Automated sync from \`main\`. Review and merge to keep this branch up to date. If there are conflicts, resolve them in the PR."
            echo "📬 Opened PR: main → $branch"
          done
